<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Diagnostics</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #222; color: #fff; }
    h1 { color: #4caf50; }
    pre { background: #111; padding: 15px; border-radius: 5px; border: 1px solid #333; overflow-x: auto; white-space: pre-wrap; font-size: 14px; }
    .success { color: #4caf50; font-weight: bold; }
    .error { color: #f44336; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Firebase Diagnostics</h1>
  <p>Probando conexión directa a Firestore desde tu navegador móvil...</p>
  <pre id="log">Iniciando diagnóstico...</pre>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script>
    const logEl = document.getElementById('log');
    function log(msg, type = '') {
      const span = document.createElement('span');
      span.className = type;
      span.textContent = msg + '\n';
      logEl.appendChild(span);
      console.log(msg);
    }

    // Configuración oficial del proyecto
    const firebaseConfig = {
      apiKey: "AIzaSyDGQWW8tVP8kk6Nss-GCutohfD6IouLzp0",
      authDomain: "plants-and-pets-app.firebaseapp.com",
      projectId: "plants-and-pets-app",
      storageBucket: "plants-and-pets-app.firebasestorage.app",
      messagingSenderId: "1044210464501",
      appId: "1:1044210464501:web:c9bf8245db3c596977f7bc"
    };

    async function runDiagnostics() {
      // Clear initial text
      logEl.textContent = '';
      try {
        log("1. Inicializando Firebase SDK...");
        const app = firebase.initializeApp(firebaseConfig);
        log("Firebase inicializado correctamente.", "success");

        log("\n2. Probando conexión estándar a Firestore (con WebSockets)...");
        const dbDefault = firebase.firestore(app);
        
        log("Intentando escribir documento 'hogares/browser_test'...");
        const writePromise = dbDefault.collection('hogares').doc('browser_test').set({
          browser_write: true,
          timestamp: Date.now(),
          userAgent: navigator.userAgent
        }, { merge: true });

        const timeout = (ms) => new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout de red (10s)")), ms));

        try {
          await Promise.race([writePromise, timeout(10000)]);
          log("¡ESCRITURA EXITOSA en Firestore estándar!", "success");
        } catch (e) {
          log("FALLÓ conexión estándar: " + e.message, "error");
          
          log("\n3. Probando conexión alternativa (forzando HTTP Long Polling)...");
          // Re-inicializar Firestore con long-polling
          const app2 = firebase.initializeApp(firebaseConfig, "long-polling-app");
          const dbLongPolling = firebase.firestore(app2);
          dbLongPolling.settings({
            experimentalForceLongPolling: true
          });

          log("Intentando escribir con Long Polling...");
          const writeLongPromise = dbLongPolling.collection('hogares').doc('browser_test_lp').set({
            browser_write_lp: true,
            timestamp: Date.now(),
            userAgent: navigator.userAgent
          }, { merge: true });

          try {
            await Promise.race([writeLongPromise, timeout(10000)]);
            log("¡ESCRITURA EXITOSA usando HTTP Long Polling!", "success");
          } catch (e2) {
            log("FALLÓ conexión Long Polling: " + e2.message, "error");
          }
        }
      } catch (globalErr) {
        log("Error global de inicialización: " + globalErr.message, "error");
      }
      log("\nDiagnóstico completado.");
    }

    runDiagnostics();
  </script>
</body>
</html>
